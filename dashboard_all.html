<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semua Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1a2a3a, #0f1a24);
    min-height: 100vh;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #1f3b4c, #2c7da0);
    padding: 1.5rem;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header h2 {
    font-size: 1.2rem;
}

.btn-back {
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 2rem;
    color: white;
    cursor: pointer;
}

/* CONTAINER */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 1.5rem;
}

/* GRID */
.dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
}

/* CARD */
.dashboard-card {
    background: white;
    border-radius: 1rem;
    padding: 1rem;
    cursor: pointer;
    transition: 0.2s;
}

.dashboard-card:hover {
    transform: translateY(-5px);
}

/* HEADER CARD */
.dashboard-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1rem;
}

.dashboard-title {
    font-weight: 600;
    font-size: 0.95rem;
}

.dashboard-code {
    font-size: 0.7rem;
    background: #eee;
    padding: 0.2rem 0.5rem;
    border-radius: 1rem;
}

/* PREVIEW ICON */
.dashboard-preview {
    height: 120px;
    background: #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0.5rem;
    margin-bottom: 0.5rem;
}

.dashboard-preview i {
    font-size: 2rem;
    color: #94a3b8;
}

.dashboard-info {
    text-align: center;
    font-size: 0.75rem;
    color: #64748b;
}

/* EMPTY */
.empty {
    text-align: center;
    color: white;
    margin-top: 2rem;
}
</style>
</head>

<body>

<div class="header">
    <h2><i class="fas fa-chart-line"></i> Semua Dashboard</h2>
    <button class="btn-back" onclick="window.location.href='dashboard_user.html'">
        <i class="fas fa-arrow-left"></i> Kembali
    </button>
</div>

<div class="container">
    <div id="content"></div>
</div>

<script type="module">

// FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyDrg1ltpGK_5Q85SDHVycSqMnaX1zYByLU",
    authDomain: "toi-projects.firebaseapp.com",
    projectId: "toi-projects"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// NAVIGASI
function navigateToLink(link) {
    if (!auth.currentUser) {
        alert("Silakan login terlebih dahulu");
        window.location.href = "index.html";
        return;
    }
    window.location.href = link;
}

// LOAD DATA
async function loadData(user) {

    const content = document.getElementById("content");
    content.innerHTML = "<div class='empty'>Loading...</div>";

    const userDoc = await getDoc(doc(db, "users", user.uid));

    if (!userDoc.exists()) {
        content.innerHTML = "<div class='empty'>Tidak ada data</div>";
        return;
    }

    const data = userDoc.data();
    const products = data.projects || [];

    if (products.length === 0) {
        content.innerHTML = "<div class='empty'>Belum ada dashboard</div>";
        return;
    }

    let html = `<div class="dashboard-grid">`;

    for (let code of products) {

        const prod = await getDoc(doc(db, "products", code));
        if (!prod.exists()) continue;

        const p = prod.data();
        if (!p.link) continue;

        html += `
        <div class="dashboard-card" data-link="${p.link}">
            <div class="dashboard-header">
                <div class="dashboard-title">${p.name || code}</div>
                <div class="dashboard-code">${code}</div>
            </div>

            <div class="dashboard-preview">
                <i class="fas fa-chart-line"></i>
            </div>

            <div class="dashboard-info">
                Klik kartu untuk membuka dashboard
            </div>
        </div>
        `;
    }

    html += `</div>`;
    content.innerHTML = html;

    // CLICK CARD
    document.querySelectorAll(".dashboard-card").forEach(card => {
        card.addEventListener("click", () => {
            const link = card.dataset.link;
            if (link) {
                navigateToLink(link);
            }
        });
    });
}

// AUTH CHECK
onAuthStateChanged(auth, user => {
    if (!user) {
        window.location.href = "index.html";
    } else {
        loadData(user);
    }
});

</script>

</body>
</html>
