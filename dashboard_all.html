<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semua Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a2a3a, #0f1a24);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1f3b4c, #2c7da0);
            padding: 1.5rem;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 1.5rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .dashboard-card {
            background: white;
            border-radius: 1rem;
            padding: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .dashboard-title {
            font-weight: 600;
        }

        .dashboard-code {
            font-size: 0.7rem;
            background: #eee;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
        }

        .dashboard-preview {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }

        .dashboard-preview i {
            font-size: 2rem;
            color: #94a3b8;
        }

        .btn-open {
            width: 100%;
            padding: 0.5rem;
            border: none;
            background: #2c7da0;
            color: white;
            border-radius: 1rem;
            cursor: pointer;
        }

        .btn-open:hover {
            background: #1f5e7a;
        }

        .empty {
            text-align: center;
            color: white;
            margin-top: 2rem;
        }
    </style>
</head>

<body>

<div class="header">
    <h2><i class="fas fa-chart-line"></i> Kumpulan Dashboard</h2>
</div>

<div class="container">
    <div id="content"></div>
</div>

<script type="module">

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "toi-projects.firebaseapp.com",
    projectId: "toi-projects"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function navigateToLink(link) {
    if (!auth.currentUser) {
        alert("Harus login dulu");
        window.location.href = "index.html";
        return;
    }
    window.location.href = link;
}

async function loadData(user) {

    const content = document.getElementById("content");
    content.innerHTML = "Loading...";

    const userDoc = await getDoc(doc(db, "users", user.uid));

    if (!userDoc.exists()) {
        content.innerHTML = "<div class='empty'>Tidak ada data</div>";
        return;
    }

    const data = userDoc.data();
    const products = data.projects || [];

    if (products.length === 0) {
        content.innerHTML = "<div class='empty'>Belum ada dashboard</div>";
        return;
    }

    let html = `<div class="dashboard-grid">`;

    for (let code of products) {

        const prod = await getDoc(doc(db, "products", code));

        if (!prod.exists()) continue;

        const p = prod.data();
        if (!p.link) continue;

        html += `
        <div class="dashboard-card" data-link="${p.link}">
            <div class="dashboard-header">
                <div class="dashboard-title">${p.name}</div>
                <div class="dashboard-code">${code}</div>
            </div>

            <div class="dashboard-preview">
                <i class="fas fa-chart-line"></i>
            </div>

            <button class="btn-open" data-link="${p.link}">
                Buka Dashboard
            </button>
        </div>
        `;
    }

    html += `</div>`;
    content.innerHTML = html;

    // klik card
    document.querySelectorAll(".dashboard-card").forEach(card => {
        card.addEventListener("click", () => {
            navigateToLink(card.dataset.link);
        });
    });

    // klik tombol
    document.querySelectorAll(".btn-open").forEach(btn => {
        btn.addEventListener("click", (e) => {
            e.stopPropagation();
            navigateToLink(btn.dataset.link);
        });
    });
}

// AUTH CHECK
onAuthStateChanged(auth, user => {
    if (!user) {
        window.location.href = "index.html";
    } else {
        loadData(user);
    }
});

</script>

</body>
</html>
