<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Dashboard | Login dengan Firebase</title>
    <!-- Firebase SDK v9 (modular) -->
    <script type="module">
        // ======================= KONFIGURASI FIREBASE =======================
        // GANTI DENGAN KONFIGURASI PROYEK ANDA DARI FIREBASE CONSOLE
        const firebaseConfig = {
            apiKey: "AIzaSyDrg1ltpGK_5Q85SDHVycSqMnaX1zYByLU",
          authDomain: "toi-projects.firebaseapp.com",
          projectId: "toi-projects",
          storageBucket: "toi-projects.firebasestorage.app",
          messagingSenderId: "676733316634",
          appId: "1:676733316634:web:161451d5a16ab5346d6ba3"
        };
        // ====================================================================

        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, updatePassword, signOut, onAuthStateChanged, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Email admin khusus
        const ADMIN_EMAIL = "teknikotomasiindustri.nepan@gmail.com";
        const ADMIN_PASSWORD = "admin12345";

        // URL dashboard berdasarkan role
        const ADMIN_DASHBOARD_URL = "https://teknikotomasiindustrinepan.github.io/projects/dashboard_admin.html";
        const USER_DASHBOARD_URL = "https://teknikotomasiindustrinepan.github.io/projects/dashboard_user.html";

        // Fungsi redirect berdasarkan email
        function redirectBasedOnRole(email) {
            if (email === ADMIN_EMAIL) {
                window.location.href = ADMIN_DASHBOARD_URL;
            } else {
                window.location.href = USER_DASHBOARD_URL;
            }
        }

        // DOM elements
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const forgotForm = document.getElementById('forgotForm');
        const changePwForm = document.getElementById('changePwForm');
        const userInfoDiv = document.getElementById('userInfo');
        const adminBadge = document.getElementById('adminBadge');
        const userEmailSpan = document.getElementById('userEmail');
        const messageDiv = document.getElementById('message');
        const mainContainer = document.getElementById('mainContainer');
        const toggleLinks = document.querySelectorAll('.toggle-link');
        const logoutBtn = document.getElementById('logoutBtn');
        const showChangePwBtn = document.getElementById('showChangePwBtn');
        const cancelChangePwBtn = document.getElementById('cancelChangePwBtn');

        // Helper: tampilkan pesan
        function showMessage(text, isError = true) {
            messageDiv.textContent = text;
            messageDiv.className = isError ? 'message error' : 'message success';
            setTimeout(() => {
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            }, 5000);
        }

        // Helper: tampilkan form tertentu
        function showForm(formToShow) {
            loginForm.classList.add('hidden');
            signupForm.classList.add('hidden');
            forgotForm.classList.add('hidden');
            changePwForm.classList.add('hidden');
            if (formToShow === 'login') loginForm.classList.remove('hidden');
            if (formToShow === 'signup') signupForm.classList.remove('hidden');
            if (formToShow === 'forgot') forgotForm.classList.remove('hidden');
            if (formToShow === 'change') changePwForm.classList.remove('hidden');
        }

        // Update UI berdasarkan status login (tidak digunakan lagi karena setelah login akan redirect)
        function updateUI(user) {
            if (user) {
                // Jika masih ada user yang login di halaman ini (misalnya setelah redirect gagal), kita redirect
                redirectBasedOnRole(user.email);
            } else {
                // User logout
                mainContainer.classList.remove('logged-in');
                userInfoDiv.classList.add('hidden');
                document.getElementById('authForms').classList.remove('hidden');
                document.getElementById('userPanel').classList.add('hidden');
                showForm('login');
                // reset form input
                document.querySelectorAll('input').forEach(input => input.value = '');
            }
        }

        // ======================= LOGIN =======================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                // Cek apakah ini admin dengan password admin12345 (validasi tambahan)
                if (email === ADMIN_EMAIL && password !== ADMIN_PASSWORD) {
                    throw new Error('Password admin salah. Gunakan password khusus admin.');
                }
                await signInWithEmailAndPassword(auth, email, password);
                // Setelah login sukses, redirect berdasarkan role
                redirectBasedOnRole(email);
            } catch (error) {
                let errMsg = error.message;
                if (error.code === 'auth/user-not-found') errMsg = 'Email tidak terdaftar.';
                if (error.code === 'auth/wrong-password') errMsg = 'Password salah.';
                if (error.code === 'auth/invalid-email') errMsg = 'Format email tidak valid.';
                showMessage(errMsg, true);
            }
        });

        // ======================= SIGN UP =======================
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;

            if (password !== confirm) {
                showMessage('Konfirmasi password tidak cocok!', true);
                return;
            }
            if (email === ADMIN_EMAIL) {
                showMessage('Email ini adalah akun admin khusus. Tidak bisa didaftarkan ulang.', true);
                return;
            }
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                // Setelah registrasi berhasil, user otomatis login, langsung redirect ke dashboard user
                redirectBasedOnRole(email);
            } catch (error) {
                let errMsg = error.message;
                if (error.code === 'auth/email-already-in-use') errMsg = 'Email sudah digunakan.';
                if (error.code === 'auth/weak-password') errMsg = 'Password minimal 6 karakter.';
                showMessage(errMsg, true);
            }
        });

        // ======================= LUPA PASSWORD (RESET) =======================
        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            if (email === ADMIN_EMAIL) {
                showMessage('Akun admin tidak dapat mereset password melalui form ini. Hubungi pengelola.', true);
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                showMessage(`Email reset password telah dikirim ke ${email}. Cek kotak masuk/spam.`, false);
                document.getElementById('forgotEmail').value = '';
                setTimeout(() => showForm('login'), 3000);
            } catch (error) {
                let errMsg = error.message;
                if (error.code === 'auth/user-not-found') errMsg = 'Email tidak terdaftar.';
                showMessage(errMsg, true);
            }
        });

        // ======================= GANTI PASSWORD (setelah login) =======================
        showChangePwBtn.addEventListener('click', () => {
            showForm('change');
            document.getElementById('changePwCurrent').value = '';
            document.getElementById('changePwNew').value = '';
            document.getElementById('changePwConfirm').value = '';
        });

        cancelChangePwBtn.addEventListener('click', () => {
            showForm('login');
            changePwForm.classList.add('hidden');
        });

        changePwForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById('changePwCurrent').value;
            const newPassword = document.getElementById('changePwNew').value;
            const confirmNew = document.getElementById('changePwConfirm').value;
            const user = auth.currentUser;

            if (!user) {
                showMessage('Sesi berakhir, silakan login ulang.', true);
                return;
            }
            if (newPassword !== confirmNew) {
                showMessage('Password baru tidak cocok.', true);
                return;
            }
            if (newPassword.length < 6) {
                showMessage('Password baru minimal 6 karakter.', true);
                return;
            }

            try {
                const credential = EmailAuthProvider.credential(user.email, currentPassword);
                await reauthenticateWithCredential(user, credential);
                await updatePassword(user, newPassword);
                showMessage('Password berhasil diubah!', false);
                showForm('login');
                changePwForm.reset();
            } catch (error) {
                let errMsg = error.message;
                if (error.code === 'auth/wrong-password') errMsg = 'Password saat ini salah.';
                if (error.code === 'auth/requires-recent-login') errMsg = 'Harap login ulang untuk keamanan.';
                showMessage(errMsg, true);
            }
        });

        // ======================= LOGOUT =======================
        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
            showMessage('Anda telah logout.', false);
            // Tetap di halaman ini setelah logout
        });

        // ======================= NAVIGASI FORM (toggle) =======================
        toggleLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const target = link.getAttribute('data-target');
                if (target === 'login') showForm('login');
                if (target === 'signup') showForm('signup');
                if (target === 'forgot') showForm('forgot');
            });
        });

        // ======================= MONITOR STATUS AUTH =======================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Jika sudah login dan masih berada di halaman ini, redirect
                redirectBasedOnRole(user.email);
            } else {
                // User tidak login, tampilkan form login
                updateUI(null);
            }
        });

        // Tampilkan login sebagai default awal
        showForm('login');
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #e0eaf4 0%, #cfdef3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 500px;
            padding: 2rem 2rem 2rem 2rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.6);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1A2A4F, #2C3E66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .sub {
            text-align: center;
            color: #2c3e66cc;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #1e2f41;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 1.5rem;
            font-size: 1rem;
            transition: 0.2s;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }

        button {
            width: 100%;
            background: #1f3b4c;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #0f2b3a;
            transform: scale(0.98);
        }

        .toggle-buttons {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .toggle-link {
            color: #2c7da0;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            margin: 0 8px;
        }

        .toggle-link:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .message {
            margin-top: 1rem;
            padding: 0.7rem;
            border-radius: 1rem;
            text-align: center;
            font-size: 0.85rem;
        }

        .error {
            background: #ffe6e6;
            color: #c0392b;
            border-left: 4px solid #c0392b;
        }

        .success {
            background: #e0f2e9;
            color: #1e6f3f;
            border-left: 4px solid #1e6f3f;
        }

        #userInfo {
            background: #eef2fc;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .badge-admin {
            display: inline-block;
            background: #ffb347;
            color: #2c1e0a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 8px;
        }

        .user-email {
            font-weight: bold;
            word-break: break-all;
        }

        .button-secondary {
            background: #5f7f9e;
            margin-top: 0.8rem;
        }

        .button-outline {
            background: transparent;
            border: 1px solid #1f3b4c;
            color: #1f3b4c;
        }

        .button-outline:hover {
            background: #1f3b4c10;
        }

        .flex-btns {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        hr {
            margin: 20px 0;
            border-color: #dce5f0;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 2rem;
            color: #4a627a;
        }
    </style>
</head>
<body>
<div class="glass-card" id="mainContainer">
    <h1><i class="fas fa-shield-alt"></i> Dashboard IoT</h1>
    <div class="sub">Akses terintegrasi Firebase</div>

    <!-- Tempat pesan -->
    <div id="message" class="message"></div>

    <!-- Form autentikasi (login, signup, forgot) -->
    <div id="authForms">
        <!-- LOGIN FORM -->
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="contoh@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="********" required>
            </div>
            <button type="submit">Masuk</button>
            <div class="toggle-buttons">
                <span>Belum punya akun? </span><a href="#" class="toggle-link" data-target="signup">Daftar</a>
                <span> | </span><a href="#" class="toggle-link" data-target="forgot">Lupa Password?</a>
            </div>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" class="hidden">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="contoh@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="minimal 6 karakter" required>
            </div>
            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password" id="signupConfirm" placeholder="ulangi password" required>
            </div>
            <button type="submit">Buat Akun</button>
            <div class="toggle-buttons">
                <span>Sudah punya akun? </span><a href="#" class="toggle-link" data-target="login">Login</a>
            </div>
        </form>

        <!-- FORGOT PASSWORD -->
        <form id="forgotForm" class="hidden">
            <div class="form-group">
                <label>Email terdaftar</label>
                <input type="email" id="forgotEmail" placeholder="email anda" required>
            </div>
            <button type="submit">Kirim Email Reset</button>
            <div class="toggle-buttons">
                <a href="#" class="toggle-link" data-target="login">Kembali ke Login</a>
            </div>
        </form>
    </div>

    <!-- Panel setelah login sukses (tidak akan terlihat karena redirect) -->
    <div id="userPanel" class="hidden">
        <div id="userInfo">
            <i class="fas fa-user-circle"></i> <strong>Login sebagai:</strong><br>
            <span id="userEmail" class="user-email"></span>
            <span id="adminBadge" class="badge-admin hidden">👑 ADMIN</span>
        </div>

        <div class="flex-btns">
            <button id="showChangePwBtn" class="button-secondary">Ganti Password</button>
            <button id="logoutBtn" class="button-outline">Logout</button>
        </div>

        <!-- Form ganti password (muncul saat klik tombol) -->
        <form id="changePwForm" class="hidden" style="margin-top: 20px;">
            <hr>
            <div class="form-group">
                <label>Password Saat Ini</label>
                <input type="password" id="changePwCurrent" required>
            </div>
            <div class="form-group">
                <label>Password Baru</label>
                <input type="password" id="changePwNew" required>
            </div>
            <div class="form-group">
                <label>Konfirmasi Password Baru</label>
                <input type="password" id="changePwConfirm" required>
            </div>
            <div class="flex-btns">
                <button type="submit">Simpan Password</button>
                <button type="button" id="cancelChangePwBtn" class="button-outline">Batal</button>
            </div>
        </form>
    </div>

    <footer>
        <i class="fas fa-firebase"></i> Firebase Authentication | Admin khusus: teknikotomasiindustri.nepan@gmail.com
    </footer>
</div>

<!-- Font Awesome untuk ikon (opsional) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
