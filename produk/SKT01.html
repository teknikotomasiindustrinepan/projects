<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard IoT | Soil Moisture Monitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 15px 25px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .header h1 {
      color: #2c3e50;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logout-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .logout-btn:hover {
      background: #c0392b;
      transform: scale(0.95);
    }

    /* MQTT Indicator */
    .mqtt-box {
      display: flex;
      align-items: center;
      gap: 15px;
      background: #f0f0f0;
      padding: 8px 20px;
      border-radius: 50px;
    }

    .indicator {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      transition: all 0.3s;
    }

    .indicator.connecting {
      background: #f39c12;
      box-shadow: 0 0 10px #f39c12;
      animation: blink 1s infinite;
    }

    .indicator.connected {
      background: #2ecc71;
      box-shadow: 0 0 10px #2ecc71;
    }

    .indicator.disconnected {
      background: #e74c3c;
      box-shadow: 0 0 10px #e74c3c;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 25px;
      margin-bottom: 25px;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 3px solid #3498db;
      color: #2c3e50;
    }

    .sensor-value {
      text-align: center;
      font-size: 4rem;
      font-weight: bold;
      font-family: monospace;
      background: #ecf0f1;
      border-radius: 20px;
      padding: 20px;
      margin: 15px 0;
    }

    .status-text {
      text-align: center;
      padding: 12px;
      border-radius: 15px;
      font-weight: bold;
      margin-top: 10px;
    }

    .pump-icon {
      text-align: center;
      font-size: 4rem;
      margin: 20px 0;
    }

    .pump-status {
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 12px;
      border-radius: 15px;
    }

    .pump-on {
      background: #ff9800;
      color: white;
    }

    .pump-off {
      background: #4caf50;
      color: white;
    }

    /* Slider */
    .threshold-control {
      margin-top: 20px;
      padding: 15px;
      background: #ecf0f1;
      border-radius: 15px;
    }

    input[type="range"] {
      width: 100%;
      margin: 10px 0;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
      font-weight: bold;
    }

    button:hover {
      background: #2980b9;
    }

    .chart-container {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
    }

    canvas {
      max-height: 300px;
    }

    .info {
      background: #34495e;
      color: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      margin-top: 15px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🌱 Smart Irrigation Dashboard</h1>
    <div style="display: flex; gap: 15px;">
      <div class="mqtt-box">
        <div class="indicator connecting" id="mqttIndicator"></div>
        <span id="mqttStatus">Menghubungkan...</span>
      </div>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <div class="grid">
    <!-- Sensor Card -->
    <div class="card">
      <div class="card-title">💧 Nilai Sensor Tanah</div>
      <div class="sensor-value" id="sensorValue">---</div>
      <div class="status-text" id="moistureStatus">Menunggu data...</div>
      <div class="info">📊 Range: 0 (basah) - 1023 (kering)</div>
    </div>

    <!-- Pump Card -->
    <div class="card">
      <div class="card-title">🚰 Status Pompa</div>
      <div class="pump-icon" id="pumpIcon">⛲</div>
      <div class="pump-status pump-off" id="pumpStatus">OFF</div>
      
      <div class="threshold-control">
        <label>⚙️ Ambang Batas (Threshold): <strong id="thresholdVal">700</strong></label>
        <input type="range" id="thresholdSlider" min="300" max="900" value="700" step="10">
        <button onclick="applyThreshold()">Terapkan Threshold</button>
        <div class="info" style="margin-top: 10px; background: #bdc3c7; color: #2c3e50;">
          💡 Jika sensor ≥ threshold → Pompa ON (menyiram)
        </div>
      </div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-container">
    <div class="card-title">📈 Grafik Sensor Real-time</div>
    <canvas id="sensorChart"></canvas>
    <div class="info" style="margin-top: 10px;">
      🕒 Update terakhir: <strong id="lastUpdate">--:--:--</strong>
    </div>
  </div>
</div>

<script>
  // ========= KONFIGURASI =========
  // Menggunakan WebSocket port 8080 (alternatif yang lebih stabil)
  const MQTT_BROKER = "broker.hivemq.com";
  const MQTT_PORT = 8080;  // Ganti ke 8080 (WebSocket over TLS lebih stabil)
  const MQTT_TOPIC = "iot/soil/moisture";
  const CLIENT_ID = "web_" + Math.random().toString(36).substr(2, 8);
  
  let client = null;
  let lastValue = null;
  let currentThreshold = 700;
  let chart = null;
  let chartData = [];
  let chartLabels = [];
  let reconnectAttempts = 0;
  let reconnectTimer = null;
  
  // DOM Elements
  const mqttIndicator = document.getElementById('mqttIndicator');
  const mqttStatus = document.getElementById('mqttStatus');
  const sensorValueEl = document.getElementById('sensorValue');
  const moistureStatusEl = document.getElementById('moistureStatus');
  const pumpIconEl = document.getElementById('pumpIcon');
  const pumpStatusEl = document.getElementById('pumpStatus');
  const thresholdSlider = document.getElementById('thresholdSlider');
  const thresholdVal = document.getElementById('thresholdVal');
  const lastUpdateEl = document.getElementById('lastUpdate');
  
  // ========= FUNGSI UPDATE UI =========
  function updateUI(value) {
    if (value === null) return;
    
    lastValue = value;
    sensorValueEl.innerHTML = value;
    
    // Update status kelembaban
    if (value >= currentThreshold) {
      moistureStatusEl.innerHTML = "🌵 TANAH KERING → Pompa AKTIF";
      moistureStatusEl.style.background = "#ff9800";
      moistureStatusEl.style.color = "white";
      pumpStatusEl.innerHTML = "💦 POMPA ON (MENYIRAM)";
      pumpStatusEl.className = "pump-status pump-on";
      pumpIconEl.innerHTML = "💧🚰💧";
    } else {
      moistureStatusEl.innerHTML = "💧 TANAH LEMBAP → Pompa MATI";
      moistureStatusEl.style.background = "#4caf50";
      moistureStatusEl.style.color = "white";
      pumpStatusEl.innerHTML = "⭕ POMPA OFF";
      pumpStatusEl.className = "pump-status pump-off";
      pumpIconEl.innerHTML = "⛲💤";
    }
    
    // Update waktu
    const now = new Date();
    lastUpdateEl.innerHTML = now.toLocaleTimeString();
    
    // Update grafik
    addToChart(value);
  }
  
  // ========= GRAFIK =========
  function initChart() {
    const ctx = document.getElementById('sensorChart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Nilai Sensor Tanah',
          data: [],
          borderColor: '#3498db',
          backgroundColor: 'rgba(52, 152, 219, 0.1)',
          borderWidth: 2,
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          y: { min: 0, max: 1024, title: { display: true, text: 'Nilai ADC' } }
        }
      }
    });
  }
  
  function addToChart(value) {
    if (!chart) return;
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
    chartData.push(value);
    chartLabels.push(time);
    if (chartData.length > 20) {
      chartData.shift();
      chartLabels.shift();
    }
    chart.data.labels = chartLabels;
    chart.data.datasets[0].data = chartData;
    chart.update();
  }
  
  // ========= MQTT DENGAN AUTO RECONNECT =========
  function updateMQTTIndicator(state, message) {
    mqttIndicator.className = 'indicator';
    if (state === 'connecting') {
      mqttIndicator.classList.add('connecting');
      mqttStatus.innerHTML = message || 'Menghubungkan...';
    } else if (state === 'connected') {
      mqttIndicator.classList.add('connected');
      mqttStatus.innerHTML = message || 'Tersambung ✓';
    } else {
      mqttIndicator.classList.add('disconnected');
      mqttStatus.innerHTML = message || 'Terputus ↻';
    }
  }
  
  function connectMQTT() {
    if (client && client.isConnected()) {
      try { client.disconnect(); } catch(e) {}
    }
    
    updateMQTTIndicator('connecting', 'Menghubungkan ke broker...');
    
    // Gunakan WebSocket dengan port 8080 (lebih stabil)
    client = new Paho.MQTT.Client(MQTT_BROKER, MQTT_PORT, CLIENT_ID);
    
    client.onConnectionLost = (response) => {
      console.log("MQTT Lost:", response.errorMessage);
      updateMQTTIndicator('disconnected', 'Koneksi putus, mencoba ulang...');
      
      // Auto reconnect setelah 5 detik
      if (reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => {
        reconnectAttempts++;
        connectMQTT();
      }, 5000);
    };
    
    client.onMessageArrived = (message) => {
      if (message.destinationName === MQTT_TOPIC) {
        const val = parseInt(message.payloadString);
        if (!isNaN(val)) {
          updateUI(val);
          reconnectAttempts = 0; // Reset attempts jika berhasil terima data
        }
      }
    };
    
    const connectOptions = {
      timeout: 10,
      onSuccess: () => {
        console.log("MQTT Connected!");
        updateMQTTIndicator('connected', 'Tersambung | Menunggu data...');
        client.subscribe(MQTT_TOPIC, { qos: 0 });
        reconnectAttempts = 0;
      },
      onFailure: (err) => {
        console.error("MQTT Failed:", err);
        updateMQTTIndicator('disconnected', `Gagal (${reconnectAttempts + 1}), mencoba ulang...`);
        
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(() => {
          reconnectAttempts++;
          connectMQTT();
        }, 5000);
      },
      keepAliveInterval: 30,
      cleanSession: true
    };
    
    client.connect(connectOptions);
  }
  
  // ========= THRESHOLD =========
  function applyThreshold() {
    currentThreshold = parseInt(thresholdSlider.value);
    thresholdVal.innerHTML = currentThreshold;
    if (lastValue !== null) {
      updateUI(lastValue);
    }
  }
  
  // ========= LOGOUT =========
  function logout() {
    if (client && client.isConnected()) {
      client.disconnect();
    }
    window.location.href = "https://teknikotomasiindustrinepan.github.io/projects/dashboard_user.html";
  }
  
  // ========= INIT =========
  function init() {
    initChart();
    thresholdSlider.addEventListener('input', () => {
      thresholdVal.innerHTML = thresholdSlider.value;
    });
    connectMQTT();
  }
  
  window.addEventListener('load', init);
</script>
</body>
</html>
