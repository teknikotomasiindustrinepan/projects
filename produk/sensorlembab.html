<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soil Moisture Monitor - Real-time Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .value-card {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .moisture-value {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
        }

        .moisture-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .unit {
            font-size: 24px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.3s ease;
            background: #ffd700;
            border-radius: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 14px;
        }

        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
        }

        .status-wet {
            background: #10b981;
            color: white;
        }

        .status-dry {
            background: #f59e0b;
            color: white;
        }

        .status-very-dry {
            background: #ef4444;
            color: white;
        }

        .last-update {
            font-size: 12px;
            color: #666;
            margin-top: 15px;
            text-align: center;
        }

        canvas {
            max-height: 300px;
            width: 100%;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
        }

        button:hover {
            background: #2563eb;
        }

        .connection-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 10px;
        }

        .connected {
            background: #10b981;
            color: white;
        }

        .disconnected {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card header">
            <h1>💧 Soil Moisture Monitor</h1>
            <p>Real-time Kelembaban Tanah</p>
            <div>
                MQTT: <span id="mqttConnectionBadge" class="connection-badge disconnected">Menghubungkan...</span>
            </div>
        </div>

        <div class="card value-card">
            <div class="moisture-label">Kelembaban Tanah</div>
            <div class="moisture-value">
                <span id="moistureValue">---</span><span class="unit"></span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
            <div class="info-row">
                <span>💧 Lembab</span>
                <span id="statusText">Menunggu data...</span>
                <span>🌵 Kering</span>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 15px;">📈 Grafik Kelembaban (60 detik terakhir)</h3>
            <canvas id="moistureChart"></canvas>
            <button onclick="resetChart()">🔄 Reset Grafik</button>
        </div>

        <div class="card">
            <div class="last-update" id="lastUpdate">
                Terakhir update: ---
            </div>
            <div style="font-size: 11px; color: #999; text-align: center; margin-top: 10px;">
                Topic: iot/soil/moisture | Server: broker.hivemq.com
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi MQTT
        const broker = "wss://broker.hivemq.com:8884/mqtt";
        const topic = "iot/soil/moisture";
        
        // Data untuk grafik (max 60 data points = 5 menit jika 5 detik sekali)
        let moistureData = [];
        let timeLabels = [];
        let chart = null;
        let lastValue = 0;
        
        // MQTT Client
        let client = null;
        
        // Inisialisasi Chart
        function initChart() {
            const ctx = document.getElementById('moistureChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: timeLabels,
                    datasets: [{
                        label: 'Kelembaban Tanah',
                        data: moistureData,
                        borderColor: 'rgb(59, 130, 246)',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3,
                        pointBackgroundColor: 'rgb(59, 130, 246)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 1024,
                            title: {
                                display: true,
                                text: 'Nilai Sensor (0-1024)'
                            },
                            grid: {
                                color: 'rgba(0,0,0,0.05)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Waktu'
                            },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `Kelembaban: ${context.raw}`;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // Update grafik dengan data baru
        function updateChart(value) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            // Tambah data baru
            moistureData.push(value);
            timeLabels.push(timeStr);
            
            // Hanya simpan 60 data terakhir (5 menit jika 5 detik sekali)
            if (moistureData.length > 60) {
                moistureData.shift();
                timeLabels.shift();
            }
            
            // Update chart
            if (chart) {
                chart.data.datasets[0].data = moistureData;
                chart.data.labels = timeLabels;
                chart.update();
            }
        }
        
        // Update tampilan nilai
        function updateDisplay(value) {
            const numValue = parseInt(value);
            if (isNaN(numValue)) return;
            
            lastValue = numValue;
            
            // Update angka
            document.getElementById('moistureValue').innerHTML = numValue;
            
            // Update progress bar (0-1024 ke 0-100%)
            const percentage = (numValue / 1024) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
            
            // Update warna progress bar berdasarkan nilai
            const progressFill = document.getElementById('progressFill');
            if (numValue >= 700) {
                progressFill.style.background = '#ef4444';
                document.getElementById('statusText').innerHTML = '🌵 Kering - Perlu Penyiraman';
                document.getElementById('statusText').className = 'status status-very-dry';
            } else if (numValue >= 400) {
                progressFill.style.background = '#f59e0b';
                document.getElementById('statusText').innerHTML = '💧 Lembab - Cukup';
                document.getElementById('statusText').className = 'status status-dry';
            } else {
                progressFill.style.background = '#10b981';
                document.getElementById('statusText').innerHTML = '💧💧 Sangat Lembab - Basah';
                document.getElementById('statusText').className = 'status status-wet';
            }
            
            // Update waktu
            const now = new Date();
            document.getElementById('lastUpdate').innerHTML = `Terakhir update: ${now.toLocaleTimeString('id-ID')} | Nilai: ${numValue}`;
            
            // Update grafik
            updateChart(numValue);
        }
        
        // MQTT Connection Lost
        function onConnectionLost(response) {
            console.log("MQTT Connection Lost");
            document.getElementById('mqttConnectionBadge').innerHTML = 'Terputus';
            document.getElementById('mqttConnectionBadge').className = 'connection-badge disconnected';
            
            setTimeout(() => {
                connectMQTT();
            }, 5000);
        }
        
        // MQTT Message Arrived
        function onMessageArrived(message) {
            const payload = message.payloadString;
            console.log("Data diterima:", payload);
            updateDisplay(payload);
        }
        
        // MQTT Connect Success
        function onConnect() {
            console.log("MQTT Connected!");
            document.getElementById('mqttConnectionBadge').innerHTML = 'Terhubung';
            document.getElementById('mqttConnectionBadge').className = 'connection-badge connected';
            
            client.subscribe(topic);
            console.log("Subscribe ke topic:", topic);
        }
        
        // MQTT Connect Failed
        function onFailure(err) {
            console.error("MQTT Connection Failed:", err);
            document.getElementById('mqttConnectionBadge').innerHTML = 'Gagal';
            document.getElementById('mqttConnectionBadge').className = 'connection-badge disconnected';
            
            setTimeout(() => {
                connectMQTT();
            }, 10000);
        }
        
        // Connect ke MQTT
        function connectMQTT() {
            if (client && client.isConnected()) {
                return;
            }
            
            const clientId = "web_" + Math.random().toString(36).substr(2, 8);
            client = new Paho.MQTT.Client(broker, clientId);
            
            client.onConnectionLost = onConnectionLost;
            client.onMessageArrived = onMessageArrived;
            
            const options = {
                timeout: 10,
                useSSL: true,
                keepAliveInterval: 30,
                onSuccess: onConnect,
                onFailure: onFailure
            };
            
            client.connect(options);
        }
        
        // Reset grafik
        function resetChart() {
            moistureData = [];
            timeLabels = [];
            if (lastValue > 0) {
                updateChart(lastValue);
            } else {
                chart.data.datasets[0].data = [];
                chart.data.labels = [];
                chart.update();
            }
        }
        
        // Inisialisasi
        initChart();
        connectMQTT();
        
        // Test dengan data random jika tidak ada MQTT (untuk testing tampilan)
        // Hapus comment untuk testing tanpa NodeMCU
        /*
        let testInterval = setInterval(() => {
            const testValue = Math.floor(Math.random() * 1024);
            updateDisplay(testValue);
        }, 5000);
        */
    </script>
</body>
</html>
